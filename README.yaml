usage : |-
  ### Simple Example
  Here is an example of how you can use this module in your inventory structure:
  ```hcl
      module "droplet" {
        source             = "terraform-do-modules/droplet/digitalocean"
        version            = "1.0.6"
        name               = local.name
        environment        = local.environment
        region             = local.region
        vpc_uuid           = module.vpc.id
        ssh_key            = "ssh-rsa AAAAB3NzaC1yc2EAAAADUA1KDU= test"
        user_data          = file("user-data.sh")
        ####firewall
        inbound_rules = [
          {
            allowed_ip    = ["10.10.0.0/16"]
            allowed_ports = "22"
          },
          {
            allowed_ip    = ["0.0.0.0/0"]
            allowed_ports = "80"
          }
        ]
      }
  ```

  ### Deploy with Terraform
  ```bash
  terraform init
  terraform plan
  terraform apply
  ```

  ### Deploy with OpenTofu
  ```bash
  tofu init
  tofu plan
  tofu apply
  ```

  ### Deploy with Terragrunt
  See [`examples/terragrunt/terragrunt.hcl`](./examples/terragrunt/terragrunt.hcl) for a complete example using DigitalOcean Spaces as remote state.
  ```bash
  export DIGITALOCEAN_TOKEN="<your-token>"
  export SPACES_ACCESS_KEY_ID="<your-spaces-key>"
  export SPACES_SECRET_ACCESS_KEY="<your-spaces-secret>"
  cd examples/terragrunt
  terragrunt init
  terragrunt plan
  terragrunt apply
  ```